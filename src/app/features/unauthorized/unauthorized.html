<div class="d-flex align-items-center justify-content-center vh-100 bg-light">
  <div class="text-center px-4">
    <i class="bi bi-shield-lock text-danger" style="font-size: 5rem;"></i>
    <h1 class="display-4 fw-bold text-dark mt-3">Acceso Denegado</h1>
    
    @if (authService.usuarioAutenticado()) {
      <!-- CASO A: Es un usuario válido del sistema que se metió a una ruta prohibida para su rol -->
      <p class="lead text-secondary mt-2 mb-4">
        Tu nivel de acceso actual no cuenta con los privilegios necesarios para visualizar esta sección.
      </p>
      <a routerLink="/home" class="btn btn-primary btn-lg px-4 shadow-sm rounded-pill">
        <i class="bi bi-house-door me-2"></i> Regresar al Inicio
      </a>
    } @else {
      <!-- CASO B: Es alguien sin sesión válida en el sistema (ej. entró por URL directa sin loguearse) -->
      <p class="lead text-secondary mt-2 mb-4">
        No se ha detectado una sesión válida o tu cuenta no está registrada en el sistema de precompromisos.
      </p>
      <button type="button" class="btn btn-outline-danger btn-lg px-4 shadow-sm rounded-pill" 
          (click)="authService.cerrarSesion()">
        <i class="bi bi-box-arrow-in-right me-2"></i> Cerrar Sesión y Salir
      </button>
    }
  </div>
</div>

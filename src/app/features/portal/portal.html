@if (authService.isAutenticando()) {
  <div class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="text-center">
      <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <h5 class="text-muted fw-light">Validando credenciales...</h5>
    </div>
  </div>
} @else {
  <div class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card shadow-lg p-5 text-center" style="max-width: 400px; width: 100%;">
      <img src="assets/images/logos/legislatura/actual/Logo_Legislatura_Color_Circular.png" alt="Logo Institucional del Senado" class="mb-4 mx-auto d-block" style="max-width: 130px; width: 100%;">
      
      <h2 class="mb-3">Bienvenido</h2>
      <p class="text-muted mb-4">Sistema de Registro de Compromisos de Pago</p>
      
      <button class="btn btn-primary w-100 py-2 fw-bold" (click)="iniciarSesion()">
        Iniciar sesión con Microsoft
      </button>
    </div>
  </div>
}
